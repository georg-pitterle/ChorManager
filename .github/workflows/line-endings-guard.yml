name: Line Endings Guard

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  check-lf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'

      - name: Verify LF line endings
        run: php bin/check_lf_repo.php
