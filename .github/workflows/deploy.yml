name: Deploy to Production

on:
  push:
    branches:
      - release  # Change to your main branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Set image names
      id: set-images
      run: |
        OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
        echo "app=ghcr.io/$OWNER/chormanager-app:latest" >> "$GITHUB_OUTPUT"
        echo "web=ghcr.io/$OWNER/chormanager-web:latest" >> "$GITHUB_OUTPUT"

    - name: Build and push app image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: ${{ steps.set-images.outputs.app }}
        platforms: linux/amd64,linux/arm64
        cache-from: type=gha,scope=app
        cache-to: type=gha,mode=max,scope=app

    - name: Build and push web image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile.web
        push: true
        tags: ${{ steps.set-images.outputs.web }}
        platforms: linux/amd64,linux/arm64
        cache-from: type=gha,scope=web
        cache-to: type=gha,mode=max,scope=web