x-app-environment: &app-environment
  APP_ENV: production
  DB_HOST: db
  DB_DATABASE: ${DB_DATABASE:?set in Portainer}
  DB_USERNAME: ${DB_USERNAME:?set in Portainer}
  DB_PASSWORD: ${DB_PASSWORD:?set in Portainer}
  DB_PORT: ${DB_PORT:-3306}
  SMTP_HOST: ${SMTP_HOST:?set in Portainer}
  SMTP_PORT: ${SMTP_PORT:-587}
  SMTP_AUTH: ${SMTP_AUTH:-1}
  SMTP_USERNAME: ${SMTP_USERNAME:?set in Portainer}
  SMTP_PASSWORD: ${SMTP_PASSWORD:?set in Portainer}
  SMTP_ENCRYPTION: ${SMTP_ENCRYPTION:-tls}
  SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:?set in Portainer}
  SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Chor Manager}
  REMEMBER_ME_DAYS: ${REMEMBER_ME_DAYS:-30}
  TZ: ${TZ:-Europe/Vienna}

services:
  app:
    image: ghcr.io/georg-pitterle/chormanager-app:latest
    restart: unless-stopped
    working_dir: /var/www/html
    environment: *app-environment
    depends_on:
      - db
    networks:
      - internal
    healthcheck:
      test: [ "CMD", "php", "-r", "if (@fsockopen('127.0.0.1',9000)) { exit(0); } exit(1);" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  db:
    image: mysql:8.4
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-name-resolve
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:?set in Portainer}
      MYSQL_USER: ${DB_USERNAME:?set in Portainer}
      MYSQL_PASSWORD: ${DB_PASSWORD:?set in Portainer}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set in Portainer}
      TZ: ${TZ:-Europe/Vienna}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - internal
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${DB_USERNAME}", "-p${DB_PASSWORD}" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    stop_grace_period: 1m
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  web:
    image: ghcr.io/georg-pitterle/chormanager-web:latest
    hostname: chormanager-web-prod
    restart: unless-stopped
    depends_on:
      - app
    networks:
      internal:
      proxy:
        aliases:
          - chormanager-web-prod
    expose:
      - "80"
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    read_only: true
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/css/style.css" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  db_data:


networks:
  internal:
    driver: bridge
    internal: true
  proxy:
    external: true
    name: portainer_network
