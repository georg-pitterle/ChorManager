# ddev php default (PHP project type) config
#
# Customized: this file has been taken over to add the /webmail reverse-proxy
# location for the SnappyMail container defined in
# .ddev/docker-compose.snappymail.yaml. DDEV will not overwrite this file.
# See https://docs.ddev.com/en/stable/users/extend/customization-extendibility/#custom-nginx-configuration

server {
    listen 80 default_server;
    listen 443 ssl default_server;

    root /var/www/html/public;

    ssl_certificate /etc/ssl/certs/master.crt;
    ssl_certificate_key /etc/ssl/certs/master.key;

    include /etc/nginx/monitoring.conf;

    index index.php index.htm index.html;

    # Disable sendfile as per https://docs.vagrantup.com/v2/synced-folders/virtualbox.html
    sendfile off;
    error_log /dev/stdout info;
    access_log /var/log/nginx/access.log;

    # Reverse-proxy to the SnappyMail webmail container (.ddev/docker-compose.snappymail.yaml).
    # Trailing slash on both the location and proxy_pass strips the /webmail prefix, so
    # SnappyMail (which serves from its own root, see its bundled nginx.conf: "root
    # /snappymail; try_files $uri $uri/ index.php;") receives plain root-relative requests
    # for the HTML shell. SnappyMail has no baseuri/APPLICATION_DIR env var (the image
    # documents none), and it emits its own static assets with an absolute,
    # version-pinned path (verified empirically: /snappymail/v/<version>/static/...,
    # /snappymail/v/<version>/themes/...) rather than paths relative to /webmail/. The
    # second location below proxies that absolute prefix straight through (no stripping)
    # so those requests reach SnappyMail instead of falling through to the ChorManager
    # app's own router.
    location /webmail/ {
        client_max_body_size 25m;
        proxy_pass http://snappymail:8888/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Redirect the bare /webmail (no trailing slash) to /webmail/ so relative asset/link
    # resolution inside SnappyMail works from the very first request.
    location = /webmail {
        return 301 /webmail/;
    }

    # SnappyMail's own static assets (CSS/JS/images/fonts), requested by the browser at
    # this absolute path regardless of the /webmail/ subpath the HTML shell was served
    # from. No prefix stripping here: SnappyMail's container serves these at the exact
    # same /snappymail/... path itself (verified empirically).
    location /snappymail/ {
        client_max_body_size 25m;
        proxy_pass http://snappymail:8888/snappymail/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        absolute_redirect off;
        try_files $uri $uri/ /index.php?$query_string;
    }

    location @rewrite {
        # For D7 and above:
        # Clean URLs are handled in drupal_environment_initialize().
        rewrite ^ /index.php;
    }

    # pass the PHP scripts to FastCGI server listening on socket
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass unix:/run/php-fpm.sock;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param SCRIPT_NAME $fastcgi_script_name;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_intercept_errors off;
        # fastcgi_read_timeout should match max_execution_time in php.ini
        fastcgi_read_timeout 10m;
        fastcgi_param SERVER_NAME $host;
        fastcgi_param HTTPS $fcgi_https;
        # Pass the X-Accel-* headers to facilitate testing.
        fastcgi_pass_header "X-Accel-Buffering";
        fastcgi_pass_header "X-Accel-Charset";
        fastcgi_pass_header "X-Accel-Expires";
        fastcgi_pass_header "X-Accel-Limit-Rate";
        fastcgi_pass_header "X-Accel-Redirect";
    }

    # Prevent clients from accessing hidden files (starting with a dot)
    # This is particularly important if you store .htpasswd files in the site hierarchy
    # Access to `/.well-known/` is allowed.
    # https://www.mnot.net/blog/2010/04/07/well-known
    # https://tools.ietf.org/html/rfc5785
    location ~* /\.(?!well-known\/) {
        deny all;
    }

    # Prevent clients from accessing to backup/config/source files
    location ~* (?:\.(?:bak|conf|dist|fla|in[ci]|log|psd|sh|sql|sw[op])|~)$ {
        deny all;
    }

    include /etc/nginx/common.d/*.conf;
    include /mnt/ddev_config/nginx/*.conf;
}
