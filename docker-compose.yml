version: '3.8'

services:
  app:
    build: .
    container_name: choir-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html/src
      - ./templates:/var/www/html/templates
      - ./public:/var/www/html/public
    environment:
      - APP_ENV=production
      - DB_HOST=db
      - DB_DATABASE=choir_db
      - DB_USERNAME=choir_user
      - DB_PASSWORD=choir_password
    depends_on:
      - db
    networks:
      - choir-network

  db:
    image: mysql:8.0
    container_name: choir-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: choir_db
      MYSQL_USER: choir_user
      MYSQL_PASSWORD: choir_password
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - choir-network

  nginx:
    image: nginx:alpine
    container_name: choir-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./public:/var/www/html/public
    depends_on:
      - app
    networks:
      - choir-network

volumes:
  db_data:

networks:
  choir-network:
    driver: bridge