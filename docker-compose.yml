version: '3.8'

services:
  app:
    build: .
    container_name: choir-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./public:/var/www/html/public
    environment:
      - APP_ENV=production
      - DB_HOST=db
      - DB_DATABASE=choir_db
      - DB_USERNAME=choir_user
      - DB_PASSWORD=choir_password
      - SMTP_HOST=${SMTP_HOST:-mailhog}
      - SMTP_PORT=${SMTP_PORT:-1025}
      - SMTP_AUTH=${SMTP_AUTH:-0}
      - SMTP_USERNAME=${SMTP_USERNAME:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_ENCRYPTION=${SMTP_ENCRYPTION:-none}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL:-noreply@chor.local}
      - SMTP_FROM_NAME=${SMTP_FROM_NAME:-Chor-Manager}
    depends_on:
      - db
    networks:
      - choir-network

  db:
    image: mysql:8.0
    container_name: choir-db
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: choir_db
      MYSQL_USER: choir_user
      MYSQL_PASSWORD: choir_password
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_SSL_MODE: DISABLED
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - choir-network

  nginx:
    image: nginx:alpine
    container_name: choir-nginx
    restart: unless-stopped
    ports:
      - "8050:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./public:/var/www/html/public
    depends_on:
      - app
    networks:
      - choir-network

volumes:
  db_data:


networks:
  choir-network:
    driver: bridge
